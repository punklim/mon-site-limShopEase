<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopEase — Boutique</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#0f0f13; --surface:#1a1a24; --surface2:#22222f;
      --border:#2e2e40; --accent:#f0c060; --text:#f0eff4;
      --muted:#8888aa; --success:#50d08a; --danger:#e85a5a;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
    body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
      background:radial-gradient(ellipse at 20% 20%,rgba(240,192,96,.04) 0%,transparent 60%),
                 radial-gradient(ellipse at 80% 80%,rgba(232,136,90,.04) 0%,transparent 60%);}

    header{position:sticky;top:0;z-index:100;background:rgba(15,15,19,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 2rem;height:64px;display:flex;align-items:center;justify-content:space-between;}
    .logo{font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--accent);text-decoration:none;}
    nav{display:flex;gap:.25rem;align-items:center;}
    nav a{color:var(--muted);text-decoration:none;padding:.4rem .9rem;border-radius:8px;font-size:.9rem;font-weight:500;transition:all .2s;}
    nav a:hover{color:var(--text);background:var(--surface2);}
    nav a.active{color:var(--accent);}
    .cart-btn{position:relative;background:var(--surface2);border:1px solid var(--border);color:var(--text)!important;}
    .cart-btn:hover{border-color:var(--accent)!important;}
    #cartCount{position:absolute;top:-6px;right:-6px;background:var(--accent);color:#000;font-size:.65rem;font-weight:700;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
    .user-greeting{color:var(--muted);font-size:.85rem;padding:.4rem .9rem;}
    .user-greeting span{color:var(--accent);font-weight:600;}

    .hero{position:relative;z-index:1;background:linear-gradient(135deg,rgba(240,192,96,.08) 0%,rgba(232,136,90,.05) 100%);border-bottom:1px solid var(--border);padding:3rem 2rem;text-align:center;}
    .hero-title{font-family:'Playfair Display',serif;font-size:3rem;font-weight:700;margin-bottom:.75rem;background:linear-gradient(135deg,var(--text) 0%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .hero-sub{color:var(--muted);font-size:1rem;max-width:500px;margin:0 auto 1.5rem;}
    .hero-stats{display:flex;gap:2rem;justify-content:center;flex-wrap:wrap;}
    .hero-stat-value{font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--accent);font-weight:700;}
    .hero-stat-label{font-size:.78rem;color:var(--muted);}

    main{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:2.5rem 2rem;}

    .toolbar{display:flex;gap:1rem;align-items:center;margin-bottom:2rem;flex-wrap:wrap;}
    .search-wrap{flex:1;min-width:200px;position:relative;}
    .search-wrap input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:.7rem 1rem .7rem 2.5rem;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s;}
    .search-wrap input:focus{border-color:var(--accent);}
    .search-wrap input::placeholder{color:var(--muted);}
    .search-icon{position:absolute;left:.8rem;top:50%;transform:translateY(-50%);color:var(--muted);}
    .sort-select,.cat-select{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:.7rem 1rem;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:.85rem;outline:none;cursor:pointer;}
    .sort-select:focus,.cat-select:focus{border-color:var(--accent);}
    .result-count{color:var(--muted);font-size:.85rem;white-space:nowrap;}

    #productsList{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1.5rem;}

    .product-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;overflow:hidden;transition:all .3s cubic-bezier(.4,0,.2,1);animation:fadeUp .5s ease both;}
    .product-card:hover{transform:translateY(-5px);border-color:rgba(240,192,96,.4);box-shadow:0 16px 40px rgba(0,0,0,.3);}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

    .product-img{width:100%;height:200px;overflow:hidden;position:relative;background:var(--surface2);}
    .product-img img{width:100%;height:100%;object-fit:cover;transition:transform .4s ease;}
    .product-card:hover .product-img img{transform:scale(1.05);}
    .product-img-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:4rem;background:linear-gradient(135deg,var(--surface2),rgba(46,46,64,.5));}
    .product-badge{position:absolute;top:.75rem;left:.75rem;background:var(--accent);color:#000;font-size:.65rem;font-weight:700;padding:.25rem .6rem;border-radius:6px;letter-spacing:.05em;z-index:1;}
    .stock-badge{position:absolute;top:.75rem;right:.75rem;background:rgba(232,90,90,.9);color:#fff;font-size:.65rem;font-weight:700;padding:.25rem .6rem;border-radius:6px;z-index:1;}

    .product-body{padding:1.25rem;}
    .product-category{font-size:.72rem;color:var(--accent);text-transform:uppercase;letter-spacing:.1em;font-weight:600;margin-bottom:.3rem;}
    .product-name{font-size:.95rem;font-weight:700;margin-bottom:.3rem;color:var(--text);}
    .product-desc{font-size:.8rem;color:var(--muted);margin-bottom:.75rem;line-height:1.4;height:2.5rem;overflow:hidden;}
    .product-footer{display:flex;align-items:center;justify-content:space-between;gap:.75rem;}
    .product-price{font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--accent);font-weight:700;}
    .product-stock{font-size:.75rem;color:var(--muted);margin-top:.2rem;}
    .product-stock.low{color:var(--danger);}

    .btn-add{padding:.55rem 1rem;background:transparent;border:1px solid var(--accent);color:var(--accent);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;}
    .btn-add:hover{background:var(--accent);color:#000;}
    .btn-add.added{background:var(--success);border-color:var(--success);color:#000;}
    .btn-add:disabled{background:rgba(136,136,170,.1);border-color:var(--muted);color:var(--muted);cursor:not-allowed;}

    .login-banner{background:linear-gradient(135deg,rgba(240,192,96,.08),rgba(232,136,90,.05));border:1px solid rgba(240,192,96,.2);border-radius:16px;padding:1.2rem 1.5rem;margin-bottom:2rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;}
    .login-banner p{color:var(--muted);font-size:.9rem;}
    .login-banner p span{color:var(--text);font-weight:600;}
    .btn-login-banner{padding:.5rem 1.2rem;background:var(--accent);color:#000;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;text-decoration:none;transition:all .2s;}
    .btn-login-banner:hover{background:#f5d080;}

    .skeleton{background:linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:20px;height:320px;}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

    .empty-state{text-align:center;padding:5rem 2rem;color:var(--muted);grid-column:1/-1;}
    .empty-state .icon{font-size:3.5rem;margin-bottom:1rem;}
    .empty-state h2{font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--text);margin-bottom:.5rem;}

    #toast{position:fixed;bottom:2rem;right:2rem;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:.9rem 1.4rem;border-radius:12px;font-size:.88rem;font-weight:500;z-index:1000;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none;max-width:280px;}
    #toast.show{opacity:1;transform:translateY(0);}

    /* ✅ WHATSAPP */
    #whatsapp-btn{
      position:fixed; bottom:28px; right:28px; z-index:9999;
      background:#25D366; border-radius:50%; width:60px; height:60px;
      display:flex; align-items:center; justify-content:center;
      box-shadow:0 4px 20px rgba(37,211,102,.5);
      text-decoration:none; transition:transform .2s, box-shadow .2s;
      animation:wabounce 2s infinite;
    }
    #whatsapp-btn:hover{transform:scale(1.1);box-shadow:0 6px 28px rgba(37,211,102,.7);animation:none;}
    @keyframes wabounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

    @media(max-width:640px){.hero-title{font-size:2rem;}.toolbar{flex-direction:column;}}
  </style>
</head>
<body>

  <header>
    <a href="index.html" class="logo">ShopEase</a>
    <nav>
      <a href="index.html" class="active">Produits</a>
      <a href="orders.html">Mes Commandes</a>
      <a href="profile.html" id="profileLink" style="display:none">Mon Profil</a>
      <a href="cart.html" class="cart-btn">🛒 Panier <span id="cartCount">0</span></a>
      <span class="user-greeting" id="userGreeting"></span>
      <a href="login.html" id="authLink">Login</a>
    </nav>
  </header>

  <div class="hero">
    <h1 class="hero-title">Notre Boutique</h1>
    <p class="hero-sub">Découvrez notre sélection de produits de qualité</p>
    <div class="hero-stats">
      <div class="hero-stat">
        <div class="hero-stat-value" id="heroCount">—</div>
        <div class="hero-stat-label">Produits disponibles</div>
      </div>
      <div class="hero-stat">
        <div class="hero-stat-value">🚚</div>
        <div class="hero-stat-label">Livraison gratuite</div>
      </div>
      <div class="hero-stat">
        <div class="hero-stat-value">🔒</div>
        <div class="hero-stat-label">Paiement sécurisé</div>
      </div>
    </div>
  </div>

  <main>
    <div class="login-banner" id="loginBanner" style="display:none">
      <p><span>Connectez-vous</span> pour ajouter des produits au panier</p>
      <a href="login.html" class="btn-login-banner">Se connecter →</a>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Rechercher un produit...">
      </div>
      <select class="cat-select" id="catFilter">
        <option value="">Toutes les catégories</option>
      </select>
      <select class="sort-select" id="sortSelect">
        <option value="default">Tri par défaut</option>
        <option value="price-asc">Prix croissant</option>
        <option value="price-desc">Prix décroissant</option>
        <option value="name-asc">Nom A → Z</option>
      </select>
      <span class="result-count" id="resultCount"></span>
    </div>

    <div id="productsList">
      <div class="skeleton"></div>
      <div class="skeleton" style="opacity:.7"></div>
      <div class="skeleton" style="opacity:.4"></div>
    </div>
  </main>

  <!-- ✅ BOUTON WHATSAPP -->
  <a href="https://wa.me/212691055597?text=Bonjour%2C%20je%20suis%20intéressé%20par%20un%20produit%20sur%20ShopEase%20!"
     target="_blank" id="whatsapp-btn" title="Contactez-nous sur WhatsApp">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" fill="white">
      <path d="M16 0C7.163 0 0 7.163 0 16c0 2.824.736 5.476 2.027 7.785L0 32l8.447-2.01A15.93 15.93 0 0016 32c8.837 0 16-7.163 16-16S24.837 0 16 0zm8.073 22.824c-.334.94-1.946 1.793-2.678 1.908-.686.108-1.552.154-2.504-.158-.577-.19-1.317-.444-2.261-.87-3.978-1.72-6.578-5.72-6.778-5.985-.2-.265-1.63-2.17-1.63-4.14 0-1.97 1.033-2.94 1.4-3.34.366-.4.8-.5 1.066-.5.267 0 .534.003.767.014.247.012.578-.094.905.69.334.8 1.133 2.77 1.233 2.97.1.2.167.435.033.7-.133.267-.2.434-.4.667-.2.234-.42.522-.6.7-.2.2-.408.416-.175.816.233.4 1.033 1.7 2.217 2.75 1.522 1.356 2.806 1.776 3.206 1.976.4.2.633.167.867-.1.233-.267 1-.117 1.167.467.167.583.167 1.083-.167 2.023z"/>
    </svg>
  </a>

  <div id="toast"></div>

  <script>
    const token = localStorage.getItem("token");
    const user = JSON.parse(localStorage.getItem("user") || "{}");
    const emojis = ["🛍️","📱","💻","👟","🎧","⌚","📷","🎮","💄","👜","🕶️","👗","🏠","🎒","⚡"];
    let allProducts = [];

    if (token && user.name) {
      document.getElementById("userGreeting").innerHTML = `Bonjour, <span>${user.name.split(' ')[0]}</span>`;
      document.getElementById("authLink").textContent = "Déconnexion";
      document.getElementById("authLink").onclick = (e) => { e.preventDefault(); localStorage.clear(); location.reload(); };
      document.getElementById("profileLink").style.display = "inline-flex";
    } else {
      document.getElementById("loginBanner").style.display = "flex";
    }

    function showToast(msg, ok=true) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.style.borderColor = ok ? "var(--success)" : "var(--danger)";
      t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 2500);
    }

    function updateCartCount() {
      const cart = JSON.parse(localStorage.getItem("cart")) || [];
      document.getElementById("cartCount").textContent = cart.length;
    }

    function buildCategoryFilter(products) {
      const cats = [...new Set(products.map(p => p.category || "Général"))];
      const sel = document.getElementById("catFilter");
      cats.forEach(c => {
        const opt = document.createElement("option");
        opt.value = c; opt.textContent = c;
        sel.appendChild(opt);
      });
    }

    function renderProducts(list) {
      const container = document.getElementById("productsList");
      document.getElementById("resultCount").textContent = `${list.length} produit${list.length !== 1 ? 's' : ''}`;
      document.getElementById("heroCount").textContent = allProducts.length;

      if (!list.length) {
        container.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><h2>Aucun produit trouvé</h2><p>Essayez un autre mot-clé</p></div>`;
        return;
      }

      container.innerHTML = "";
      list.forEach((p, i) => {
        const card = document.createElement("div");
        card.className = "product-card";
        card.style.animationDelay = `${i * 0.06}s`;

        const cart = JSON.parse(localStorage.getItem("cart")) || [];
        const inCart = cart.includes(p._id);
        const outOfStock = p.stock !== undefined && p.stock === 0;

        const imgHtml = p.image
          ? `<img src="${p.image}" alt="${p.name}" onerror="this.parentElement.innerHTML='<div class=\\'product-img-placeholder\\'>${emojis[i % emojis.length]}</div>'">`
          : `<div class="product-img-placeholder">${emojis[i % emojis.length]}</div>`;

        const stockHtml = p.stock > 0 && p.stock <= 5
          ? `<div class="product-stock low">⚠️ Plus que ${p.stock} en stock</div>`
          : p.stock > 5 ? `<div class="product-stock">✓ En stock (${p.stock})</div>` : '';

        let btnHtml;
        if (!token) {
          btnHtml = `<a href="login.html" class="btn-add" style="text-decoration:none;text-align:center">Se connecter</a>`;
        } else if (outOfStock) {
          btnHtml = `<button class="btn-add" disabled>Rupture de stock</button>`;
        } else if (inCart) {
          btnHtml = `<button class="btn-add added" data-id="${p._id}">✓ Voir panier</button>`;
        } else {
          btnHtml = `<button class="btn-add" data-id="${p._id}">Ajouter</button>`;
        }

        card.innerHTML = `
          <div class="product-img">
            ${imgHtml}
            ${i < 2 ? '<span class="product-badge">NOUVEAU</span>' : ''}
            ${outOfStock ? '<span class="stock-badge">Rupture</span>' : ''}
          </div>
          <div class="product-body">
            <div class="product-category">${p.category || 'Général'}</div>
            <div class="product-name">${p.name}</div>
            ${p.description ? `<div class="product-desc">${p.description}</div>` : '<div class="product-desc"></div>'}
            <div class="product-footer">
              <div>
                <div class="product-price">€${p.price}</div>
                ${stockHtml}
              </div>
              ${btnHtml}
            </div>
          </div>`;
        container.appendChild(card);
      });

      document.querySelectorAll(".btn-add[data-id]").forEach(btn => {
        btn.addEventListener("click", () => {
          let cart = JSON.parse(localStorage.getItem("cart")) || [];
          if (cart.includes(btn.dataset.id)) { window.location.href = "cart.html"; return; }
          cart.push(btn.dataset.id);
          localStorage.setItem("cart", JSON.stringify(cart));
          btn.textContent = "✓ Voir panier";
          btn.classList.add("added");
          btn.onclick = () => window.location.href = "cart.html";
          updateCartCount();
          showToast("🛒 Produit ajouté au panier !");
        });
      });
    }

    function applyFilters() {
      const q = document.getElementById("searchInput").value.toLowerCase();
      const sort = document.getElementById("sortSelect").value;
      const cat = document.getElementById("catFilter").value;
      let list = allProducts.filter(p =>
        p.name.toLowerCase().includes(q) && (!cat || (p.category || "Général") === cat)
      );
      if (sort === "price-asc") list.sort((a,b) => a.price - b.price);
      else if (sort === "price-desc") list.sort((a,b) => b.price - a.price);
      else if (sort === "name-asc") list.sort((a,b) => a.name.localeCompare(b.name));
      renderProducts(list);
    }

    async function loadProducts() {
      try {
        const res = await fetch("/api/products");
        allProducts = await res.json();
        if (!allProducts || allProducts.length === 0) {
          document.getElementById("productsList").innerHTML = `<div class="empty-state"><div class="icon">📦</div><h2>Aucun produit disponible</h2><p>Revenez bientôt !</p></div>`;
          return;
        }
        buildCategoryFilter(allProducts);
        applyFilters();
      } catch(err) {
        document.getElementById("productsList").innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><h2>Erreur de chargement</h2></div>`;
      }
    }

    document.getElementById("searchInput").addEventListener("input", applyFilters);
    document.getElementById("sortSelect").addEventListener("change", applyFilters);
    document.getElementById("catFilter").addEventListener("change", applyFilters);

    updateCartCount();
    loadProducts();
  </script>
</body>
</html>
