<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopEase — Mes Commandes</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f13; --surface: #1a1a24; --surface2: #22222f;
      --border: #2e2e40; --accent: #f0c060; --text: #f0eff4;
      --muted: #8888aa; --success: #50d08a; --danger: #e85a5a;
      --blue: #60a5fa; --orange: #fb923c; --purple: #a78bfa;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; }
    body::before {
      content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
      background:radial-gradient(ellipse at 20% 20%,rgba(240,192,96,.04) 0%,transparent 60%),
                 radial-gradient(ellipse at 80% 80%,rgba(80,208,138,.03) 0%,transparent 60%);
    }
    header {
      position:sticky; top:0; z-index:100;
      background:rgba(15,15,19,.85); backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border);
      padding:0 2rem; height:64px; display:flex; align-items:center; justify-content:space-between;
    }
    .logo { font-family:'Playfair Display',serif; font-size:1.4rem; color:var(--accent); text-decoration:none; }
    nav { display:flex; gap:.25rem; align-items:center; }
    nav a { color:var(--muted); text-decoration:none; padding:.4rem .9rem; border-radius:8px; font-size:.9rem; font-weight:500; transition:all .2s; }
    nav a:hover { color:var(--text); background:var(--surface2); }
    nav a.active { color:var(--accent); }
    main { position:relative; z-index:1; max-width:820px; margin:0 auto; padding:3rem 2rem; }
    .page-title { font-family:'Playfair Display',serif; font-size:2.2rem; margin-bottom:.4rem; background:linear-gradient(135deg,var(--text),var(--muted)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .page-sub { color:var(--muted); font-size:.9rem; margin-bottom:2.5rem; }

    /* ORDER CARD */
    .order-card {
      background:var(--surface); border:1px solid var(--border); border-radius:20px;
      margin-bottom:1.2rem; overflow:hidden; animation:fadeUp .5s ease both; transition:border-color .3s;
    }
    .order-card:hover { border-color:rgba(240,192,96,.3); }
    @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

    .order-header {
      padding:1.2rem 1.5rem; display:flex; align-items:center; justify-content:space-between;
      cursor:pointer; user-select:none;
    }
    .order-header:hover { background:rgba(255,255,255,.02); }
    .order-meta { display:flex; align-items:center; gap:1rem; }
    .order-icon { width:42px; height:42px; background:linear-gradient(135deg,rgba(240,192,96,.2),rgba(232,136,90,.2)); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:1.2rem; flex-shrink:0; }
    .order-id { font-weight:700; font-size:.85rem; color:var(--text); }
    .order-date { font-size:.78rem; color:var(--muted); margin-top:.15rem; }
    .order-right { display:flex; align-items:center; gap:1rem; flex-wrap:wrap; }
    .order-total { font-family:'Playfair Display',serif; font-size:1.3rem; color:var(--accent); }
    .chevron { color:var(--muted); font-size:1rem; transition:transform .3s; }
    .order-card.open .chevron { transform:rotate(180deg); }

    /* STATUS BADGE */
    .badge { padding:.25rem .7rem; border-radius:20px; font-size:.75rem; font-weight:600; white-space:nowrap; }
    .badge.confirmée { background:rgba(80,208,138,.1); border:1px solid rgba(80,208,138,.3); color:var(--success); }
    .badge.expédiée { background:rgba(96,165,250,.1); border:1px solid rgba(96,165,250,.3); color:var(--blue); }
    .badge.livrée { background:rgba(240,192,96,.1); border:1px solid rgba(240,192,96,.3); color:var(--accent); }
    .badge.annulée { background:rgba(232,90,90,.1); border:1px solid rgba(232,90,90,.3); color:var(--danger); }
    .badge.en-attente { background:rgba(251,146,60,.1); border:1px solid rgba(251,146,60,.3); color:var(--orange); }

    /* ORDER BODY */
    .order-body { padding:0 1.5rem; max-height:0; overflow:hidden; transition:max-height .4s ease, padding .3s; }
    .order-card.open .order-body { max-height:800px; padding:1.2rem 1.5rem; }

    /* TIMELINE */
    .timeline { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:1.5rem; position:relative; padding:0 .5rem; }
    .timeline::before { content:''; position:absolute; top:20px; left:5%; right:5%; height:2px; background:var(--border); z-index:0; }
    .timeline-line-fill { position:absolute; top:20px; left:5%; height:2px; background:linear-gradient(90deg,var(--success),var(--accent)); z-index:1; transition:width .8s ease; }

    .timeline-step { display:flex; flex-direction:column; align-items:center; gap:.5rem; z-index:2; flex:1; }
    .timeline-dot { width:40px; height:40px; border-radius:50%; border:2px solid var(--border); background:var(--surface2); display:flex; align-items:center; justify-content:center; font-size:1rem; transition:all .4s; position:relative; }
    .timeline-dot.done { background:linear-gradient(135deg,var(--success),#3ab870); border-color:var(--success); box-shadow:0 0 12px rgba(80,208,138,.3); }
    .timeline-dot.active { background:linear-gradient(135deg,var(--accent),#e8a830); border-color:var(--accent); box-shadow:0 0 12px rgba(240,192,96,.4); animation:pulse 2s infinite; }
    .timeline-dot.cancelled { background:linear-gradient(135deg,var(--danger),#c04040); border-color:var(--danger); }
    @keyframes pulse { 0%,100%{box-shadow:0 0 12px rgba(240,192,96,.4)} 50%{box-shadow:0 0 20px rgba(240,192,96,.7)} }
    .timeline-label { font-size:.72rem; font-weight:600; color:var(--muted); text-align:center; line-height:1.3; }
    .timeline-label.done { color:var(--success); }
    .timeline-label.active { color:var(--accent); }
    .timeline-label.cancelled { color:var(--danger); }
    .timeline-date { font-size:.68rem; color:var(--muted); text-align:center; }

    /* PRODUCTS */
    .products-section { margin-top:1rem; }
    .section-label { font-size:.72rem; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.1em; margin-bottom:.75rem; }
    .product-row { display:flex; align-items:center; justify-content:space-between; padding:.6rem 0; border-bottom:1px solid var(--border); }
    .product-row:last-child { border-bottom:none; }
    .product-row-left { display:flex; align-items:center; gap:.75rem; }
    .product-emoji { font-size:1.1rem; }
    .product-row-name { font-size:.9rem; font-weight:500; }
    .product-row-price { color:var(--accent); font-weight:600; font-size:.9rem; }

    /* DELIVERY INFO */
    .delivery-info { background:var(--surface2); border-radius:12px; padding:1rem; margin-top:1rem; }
    .delivery-info-title { font-size:.72rem; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.1em; margin-bottom:.6rem; }
    .delivery-row { display:flex; gap:.6rem; font-size:.84rem; padding:.2rem 0; }
    .delivery-row span:first-child { color:var(--muted); min-width:20px; }
    .delivery-row span:last-child { color:var(--text); }

    /* EMPTY / SKELETON */
    .empty-state { text-align:center; padding:5rem 2rem; color:var(--muted); }
    .empty-state .icon { font-size:4rem; margin-bottom:1rem; }
    .empty-state h2 { font-family:'Playfair Display',serif; font-size:1.5rem; color:var(--text); margin-bottom:.5rem; }
    .empty-state p { margin-bottom:1.5rem; font-size:.9rem; }
    .btn-outline { display:inline-block; padding:.75rem 1.5rem; border:1px solid var(--accent); color:var(--accent); border-radius:10px; text-decoration:none; font-weight:600; font-size:.9rem; transition:all .2s; }
    .btn-outline:hover { background:var(--accent); color:#000; }
    .skeleton { background:linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%); background-size:200% 100%; animation:shimmer 1.5s infinite; border-radius:20px; height:76px; margin-bottom:1rem; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  </style>
</head>
<body>
  <header>
    <a href="index.html" class="logo">ShopEase</a>
    <nav>
      <a href="index.html">Produits</a>
      <a href="orders.html" class="active">Commandes</a>
      <a href="cart.html">🛒 Panier</a>
      <a href="profile.html" id="profileLink" style="display:none">Mon Profil</a>
      <a href="login.html" id="authLink">Login</a>
    </nav>
  </header>

  <main>
    <h1 class="page-title">Mes Commandes</h1>
    <p class="page-sub" id="orderCount">Chargement...</p>
    <div id="ordersList">
      <div class="skeleton"></div>
      <div class="skeleton" style="opacity:.6"></div>
      <div class="skeleton" style="opacity:.3"></div>
    </div>
  </main>

  <script>
    const token = localStorage.getItem("token");
    const user = JSON.parse(localStorage.getItem("user") || "{}");
    const emojis = ["🛍️","📱","💻","👟","🎧","⌚","📷","🎮","💄","👜"];

    // Auth nav
    if (token && user.name) {
      document.getElementById("authLink").textContent = "Déconnexion";
      document.getElementById("authLink").onclick = (e) => { e.preventDefault(); localStorage.clear(); window.location.href = "login.html"; };
      document.getElementById("profileLink").style.display = "inline-block";
    }

    function formatDate(d) {
      return new Date(d).toLocaleDateString('fr-FR', { day:'numeric', month:'long', year:'numeric' });
    }

    // Config timeline selon statut
    const STEPS = [
      { key: "en attente",  label: "En attente", emoji: "⏳" },
      { key: "confirmée",   label: "Confirmée",  emoji: "✅" },
      { key: "expédiée",    label: "Expédiée",   emoji: "🚚" },
      { key: "livrée",      label: "Livrée",     emoji: "📬" },
    ];

    function getStepIndex(status) {
      const idx = STEPS.findIndex(s => s.key === status);
      return idx === -1 ? 1 : idx;
    }

    function buildTimeline(status) {
      if (status === "annulée") {
        return `
          <div style="display:flex;align-items:center;gap:.75rem;padding:.75rem 1rem;background:rgba(232,90,90,.08);border:1px solid rgba(232,90,90,.2);border-radius:12px;margin-bottom:1.2rem;">
            <span style="font-size:1.5rem">❌</span>
            <div>
              <div style="font-weight:700;color:var(--danger)">Commande annulée</div>
              <div style="font-size:.8rem;color:var(--muted);margin-top:.2rem">Cette commande a été annulée</div>
            </div>
          </div>`;
      }

      const activeIdx = getStepIndex(status);
      const fillPct = activeIdx === 0 ? 0 : Math.min((activeIdx / (STEPS.length - 1)) * 90, 90);

      const steps = STEPS.map((step, i) => {
        let dotClass = "";
        let labelClass = "";
        if (i < activeIdx) { dotClass = "done"; labelClass = "done"; }
        else if (i === activeIdx) { dotClass = "active"; labelClass = "active"; }
        return `
          <div class="timeline-step">
            <div class="timeline-dot ${dotClass}">${i < activeIdx ? "✓" : step.emoji}</div>
            <div class="timeline-label ${labelClass}">${step.label}</div>
          </div>`;
      }).join('');

      return `
        <div style="margin-bottom:1.5rem;">
          <div class="section-label">📍 Suivi de commande</div>
          <div class="timeline">
            <div class="timeline-line-fill" style="width:${fillPct}%"></div>
            ${steps}
          </div>
        </div>`;
    }

    function getBadgeClass(status) {
      const m = {"en attente":"en-attente","confirmée":"confirmée","expédiée":"expédiée","livrée":"livrée","annulée":"annulée"};
      return m[status] || "confirmée";
    }

    function getBadgeEmoji(status) {
      const m = {"en attente":"⏳","confirmée":"✅","expédiée":"🚚","livrée":"📬","annulée":"❌"};
      return m[status] || "✅";
    }

    async function loadOrders() {
      const list = document.getElementById("ordersList");
      const countEl = document.getElementById("orderCount");

      if (!token) {
        list.innerHTML = `<div class="empty-state"><div class="icon">🔒</div><h2>Non connecté</h2><p>Connectez-vous pour voir vos commandes</p><a href="login.html" class="btn-outline">Se connecter →</a></div>`;
        countEl.textContent = "";
        return;
      }

      try {
        const res = await fetch("/api/orders", { headers: { "Authorization": "Bearer " + token } });
        const orders = await res.json();

        if (!orders || orders.length === 0) {
          countEl.textContent = "0 commande";
          list.innerHTML = `<div class="empty-state"><div class="icon">📦</div><h2>Aucune commande</h2><p>Vous n'avez pas encore passé de commande</p><a href="index.html" class="btn-outline">Découvrir les produits →</a></div>`;
          return;
        }

        countEl.textContent = `${orders.length} commande${orders.length > 1 ? 's' : ''}`;
        list.innerHTML = "";

        [...orders].reverse().forEach((order, i) => {
          const card = document.createElement("div");
          card.className = "order-card";
          card.style.animationDelay = `${i * .08}s`;

          const shortId = order._id.slice(-6).toUpperCase();
          const status = order.status || "confirmée";

          // Produits
          const productsHtml = (order.products || []).map((p, j) => `
            <div class="product-row">
              <div class="product-row-left">
                <span class="product-emoji">${emojis[j % emojis.length]}</span>
                <span class="product-row-name">${p.name || 'Produit'}</span>
              </div>
              <span class="product-row-price">€${p.price || '—'}</span>
            </div>`).join('');

          // Infos livraison
          const d = order.delivery;
          const deliveryHtml = d ? `
            <div class="delivery-info">
              <div class="delivery-info-title">📦 Adresse de livraison</div>
              <div class="delivery-row"><span>👤</span><span>${d.name || "—"}</span></div>
              <div class="delivery-row"><span>📧</span><span>${d.email || "—"}</span></div>
              <div class="delivery-row"><span>📞</span><span>${d.phone || "—"}</span></div>
              <div class="delivery-row"><span>🏠</span><span>${d.address || "—"}</span></div>
              <div class="delivery-row"><span>📮</span><span>${d.postalCode || ""} ${d.city || "—"}</span></div>
            </div>` : "";

          card.innerHTML = `
            <div class="order-header">
              <div class="order-meta">
                <div class="order-icon">📦</div>
                <div>
                  <div class="order-id">Commande #${shortId}</div>
                  <div class="order-date">${formatDate(order.createdAt)}</div>
                </div>
              </div>
              <div class="order-right">
                <span class="order-total">€${order.total}</span>
                <span class="badge ${getBadgeClass(status)}">${getBadgeEmoji(status)} ${status}</span>
                <span class="chevron">▼</span>
              </div>
            </div>
            <div class="order-body">
              ${buildTimeline(status)}
              <div class="section-label">🛍️ Produits commandés</div>
              ${productsHtml || '<p style="color:var(--muted);font-size:.9rem">Aucun détail disponible</p>'}
              <div style="display:flex;justify-content:space-between;align-items:center;padding:.75rem 0 0;margin-top:.5rem;border-top:1px solid var(--border);">
                <span style="color:var(--muted);font-size:.85rem">Total</span>
                <span style="font-family:Playfair Display,serif;font-size:1.3rem;color:var(--accent);font-weight:700">€${order.total}</span>
              </div>
              ${deliveryHtml}
            </div>`;

          card.querySelector(".order-header").addEventListener("click", () => card.classList.toggle("open"));
          list.appendChild(card);
        });

      } catch(err) {
        list.innerHTML = "<p style='color:var(--danger)'>Erreur de chargement des commandes</p>";
      }
    }

    loadOrders();
  </script>
</body>
</html>
