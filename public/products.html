<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Products</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

  <header class="bg-blue-600 text-white p-4 text-center text-2xl font-bold">
    Mon E-commerce
  </header>

  <main class="p-6">
    <h1 class="text-3xl font-bold mb-6 text-gray-800">Produits</h1>

    <!-- Liste des produits -->
    <div id="productsList" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6"></div>

    <!-- Formulaire pour ajouter un produit -->
    <div class="mt-10 bg-white p-6 rounded shadow">
      <h2 class="text-xl font-bold mb-4">Ajouter un nouveau produit</h2>
      <form id="addProductForm" class="flex flex-col gap-3">
        <input type="text" id="productName" placeholder="Nom du produit"
               class="border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400" required>
        <input type="number" id="productPrice" placeholder="Prix"
               class="border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400" required>
        <button type="submit" class="bg-blue-600 text-white p-2 rounded hover:bg-blue-700 transition">
          Ajouter
        </button>
      </form>
    </div>
  </main>

  <script>
    const token = localStorage.getItem("token");
    const productsList = document.getElementById("productsList");

    function loadProducts() {
      fetch("/api/products", {
        headers: { "Authorization": "Bearer " + token }
      })
      .then(res => res.json())
      .then(data => {
        productsList.innerHTML = "";
        if (!data || data.length === 0) {
          productsList.innerHTML = "<p class='text-gray-500'>Aucun produit trouvé</p>";
          return;
        }

        data.forEach(p => {
          const card = document.createElement("div");
          card.className = "bg-white p-4 rounded shadow flex flex-col justify-between";
          card.innerHTML = `
            <h3 class="font-bold text-lg mb-2">${p.name}</h3>
            <p class="text-gray-700 mb-4">€${p.price}</p>
            <button class="bg-orange-500 text-white p-2 rounded hover:bg-orange-600 transition" data-id="${p._id}">
              Ajouter au panier
            </button>
          `;
          productsList.appendChild(card);
        });

        // Ajouter au panier
        document.querySelectorAll("button[data-id]").forEach(btn => {
          btn.addEventListener("click", () => {
            alert("Produit ajouté au panier : " + btn.dataset.id);
          });
        });
      });
    }

    // Formulaire
    const form = document.getElementById("addProductForm");
    form.addEventListener("submit", (e) => {
      e.preventDefault();
      const name = document.getElementById("productName").value;
      const price = parseFloat(document.getElementById("productPrice").value);

      fetch("/api/products", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + token
        },
        body: JSON.stringify({ name, price })
      })
      .then(res => res.json())
      .then(data => {
        alert("Produit ajouté !");
        form.reset();
        loadProducts();
      });
    });

    loadProducts();
  </script>
</body>
</html>
